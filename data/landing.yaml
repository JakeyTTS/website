hero:
  enable: true
  weight: 10
  template: "hero"
  title: "JakeyTTS"
  subtitle: "A lightweight, modern TTS client."
  info: "Easily integrate Twitch TTS, customize voices, and manage sound effects."
  
  image:
    path: "images"
    filename: "home_jakeytts.png"
    alt: "JakeyTTS Logo"
    boxShadow: false
    rounded: true
  
  badge:
    text: "Version 2.0.2"
    color: "primary"
    pill: true
    soft: true
    
  ctaButton:
    icon: "download"
    btnText: "Download"
    url: "https://github.com/JakeyTTS/JakeyTTS/releases/download/v2.0.2/JakeyTTS_v2.0.2.exe"
  
  cta2Button:
    icon: "description"
    btnText: "Documentation"
    url: "/docs/"

featureGrid:
  enable: true
  weight: 20
  template: "feature grid"
  title: "Core Features"
  subtitle: "JakeyTTS is designed with streamers and creators in mind, offering powerful customization with a lightweight footprint."
  items:
    - title: "Twitch Integration"
      icon: "images/twitch.svg"
      description: "Directly connect to Twitch chat to speak messages, read events, and trigger automated channel rewards."
    - title: "Mixed Voices"
      icon: "tune"
      description: "Configure distinct voice profiles by mixing up to 10 different languages and voices to create a unique voice blend."
    - title: "SFX & Melodies"
      icon: "audiotrack"
      description: "Trigger customizable sound effects or create custom melodies to apply to text-to-speech events."
    - title: "Pronunciation Dictionary"
      icon: "book"
      description: "Map custom pronunciation replacement patterns to handle acronyms, usernames, or slang terms perfectly."
    - title: "Commands & Action Blocks"
      icon: "code"
      description: "Create complex workflows, custom commands, and conditional actions that are perfect for your stream."
    - title: "Extensible Plugin System"
      icon: "extension"
      description: "Easily extend functionality by writing custom plugins or importing community-built extensions."

imageCompare:
  enable: false
  weight: 30
  template: "image compare"
