hero:
  enable: true
  weight: 10
  template: "hero"
  title: "JakeyTTS"
  subtitle: "A lightweight, modern TTS client."
  info: "Easily integrate Twitch TTS, customize voices, and manage sound effects."
  
  image:
    path: "images"
    filename: "home_jakeytts.png"
    alt: "JakeyTTS Logo"
    boxShadow: false
    rounded: true
  
  badge:
    text: "Documentation"
    color: "primary"
    pill: false
    soft: true
    
  ctaButton:
    icon: "download"
    btnText: "Download v2.0"
    url: "/docs/download/"
  
  cta2Button:
    icon: "description"
    btnText: "Read Docs"
    url: "/docs/"

featureGrid:
  enable: true
  weight: 20
  template: "feature grid"
  title: "Core Features"
  subtitle: "JakeyTTS is designed with streamers and creators in mind, offering powerful customization with a lightweight footprint."
  items:
    - title: "Twitch Integration"
      icon: "chat"
      description: "Directly connect to Twitch chat to speak messages and run automated rewards."
    - title: "Voice Mixing"
      icon: "tune"
      description: "Create distinct voice profiles by mixing voices and adjusting parameters."
    - title: "SFX & Melodies"
      icon: "audiotrack"
      description: "Trigger customizable sound effects and musical notes on specified triggers."
    - title: "Plugin System"
      icon: "extension"
      description: "Easily extend the application's capabilities with custom-built plug-ins."

imageCompare:
  enable: false
  weight: 30
  template: "image compare"
