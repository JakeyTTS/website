<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Dynamic title for SEO -->
<title>{{ if .IsHome }}JakeyTTS Blog{{ else }}{{ printf "%s | JakeyTTS Blog" .Title }}{{ end }}</title>
<!-- Dynamic description for SEO -->
<meta name="description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Params.description }}{{ end }}">
{{- partialCached "head/css.html" . -}}
{{- partialCached "head/favicon.html" . -}}

<!-- Clip out 3px white border from screenshots to fix Windows screenshot border issues -->
<style>
    article img,
    figure img,
    #content img {
        clip-path: inset(3px round 8px);
        border-radius: 8px !important;
    }
</style>
