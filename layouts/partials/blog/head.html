<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Dynamic title for SEO -->
<title>{{ if .IsHome }}JakeyTTS Blog{{ else }}{{ printf "%s | JakeyTTS Blog" .Title }}{{ end }}</title>
<!-- Dynamic description for SEO -->
<meta name="description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Params.description }}{{ end }}">

<!-- Dark Mode Init -->
{{ if eq .Site.Params.docs.darkMode true -}}
    {{ $darkModeInit := resources.Get "docs/js/darkmode-init.js" | js.Build | minify -}}
    <script>{{ $darkModeInit.Content | safeJS }}</script>
{{ end -}}

{{- partialCached "head/css.html" . -}}

<!-- Blog Dark Mode Overrides CSS -->
{{- with resources.Get "css/blog-dark.css" }}
    <link rel="stylesheet" href="{{ .RelPermalink }}">
{{- end }}

{{- partialCached "head/favicon.html" . -}}

<!-- Clip out 3px white border from screenshots to fix Windows screenshot border issues -->
<style>
    article img,
    figure img,
    #content img {
        clip-path: inset(3px round 8px) !important;
        border-radius: 8px !important;
    }
</style>
